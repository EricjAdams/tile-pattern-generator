name: CI

on:
  push:
  pull_request:

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the workflow can access project files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install a stable Node.js runtime and cache frontend npm dependencies.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies from the lockfile for repeatable CI runs.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Run the existing frontend lint command to catch code quality issues.
      - name: Run frontend linting
        working-directory: frontend
        run: npm run lint

      # Run the frontend unit test suite.
      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      # Audit frontend dependencies and fail only for high or critical findings.
      - name: Run frontend security audit
        working-directory: frontend
        run: npm audit --audit-level=high

      # Build the frontend production bundle to verify release readiness.
      - name: Build frontend
        working-directory: frontend
        run: npm run build
